name: PDF Layout Quality Check

# PDFコンポーネント変更時に自動実行
# verify-pdf-quality.sh v2 で実際のPDFを検証し、レイアウト崩れを物理ブロック

on:
  push:
    paths:
      - 'src/components/pdf/**'
      - 'scripts/verify-pdf-quality.sh'
  pull_request:
    paths:
      - 'src/components/pdf/**'
      - 'scripts/verify-pdf-quality.sh'

jobs:
  pdf-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Python + pymupdf セットアップ
        run: |
          python3 -m pip install --quiet pymupdf

      - name: フィクスチャPDFをダウンロード
        env:
          FIXTURE_PDF_URL: ${{ secrets.FIXTURE_PDF_URL }}
        run: |
          if [ -z "$FIXTURE_PDF_URL" ]; then
            echo "⚠️  FIXTURE_PDF_URL が未設定 — PDFコンポーネントテストをスキップ"
            echo "SKIP=true" >> $GITHUB_ENV
            exit 0
          fi
          curl -sL "$FIXTURE_PDF_URL" -o /tmp/fixture.pdf
          if [ ! -s /tmp/fixture.pdf ]; then
            echo "❌ フィクスチャPDFのダウンロード失敗"
            exit 1
          fi
          echo "✅ フィクスチャPDF取得: $(du -sh /tmp/fixture.pdf | cut -f1)"

      - name: verify-pdf-quality.sh 実行
        if: env.SKIP != 'true'
        run: |
          chmod +x scripts/verify-pdf-quality.sh
          bash scripts/verify-pdf-quality.sh /tmp/fixture.pdf

      - name: 品質チェック失敗時のサムネイルをアーティファクトに保存
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-quality-thumbnails
          path: /tmp/verify-pg*.png
          retention-days: 7
